name: Build CoreS3

on:
  push:
    branches:
      - master
      - main
      - ci/*
  workflow_dispatch:

jobs:
  build-cores3:
    name: Build for M5Stack CoreS3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware (CoreS3) with ESP-IDF v5.5.2
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/project -w /project/esp32-m5stack-cores3 -u 0 \
            -e HOME=/tmp \
            -e WIFI_SSID="${{ secrets.WIFI_SSID }}" \
            -e WIFI_PASSWORD="${{ secrets.WIFI_PASSWORD }}" \
            -e PIPECAT_SMALLWEBRTC_URL="${{ secrets.PIPECAT_SMALLWEBRTC_URL }}" \
            espressif/idf:v5.5.2 \
            /bin/bash -c 'git config --global --add safe.directory "*" && idf.py --preview set-target esp32s3 && idf.py build && cd build && esptool.py --chip esp32s3 merge_bin -o merged-binary.bin --flash_mode dio --flash_size 16MB --fill-flash-size 16MB 0x0 bootloader/bootloader.bin 0x10000 src.bin 0x8000 partition_table/partition-table.bin'

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cores3-firmware-${{ github.sha }}
          retention-days: 7
          path: |
            esp32-m5stack-cores3/build/merged-binary.bin
            esp32-m5stack-cores3/build/src.bin
            esp32-m5stack-cores3/build/bootloader/bootloader.bin
            esp32-m5stack-cores3/build/partition_table/partition-table.bin
